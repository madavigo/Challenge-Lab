apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-ingress-only
  namespace: nginx-app
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic only from the ingress-nginx namespace (the ingress controller)
  # All other pods — including those in other namespaces — are denied by default.
  # This is the network-layer equivalent of the RBAC least-privilege model.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
