apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: nginx-app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>swampthing.online — K8s Challenge Lab</title>
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 680px; margin: 80px auto; background: #1a2a2a; color: #c9b99a; line-height: 1.6; padding: 0 20px; }
        h1 { color: #4db8a8; }
        code { background: #243333; color: #4db8a8; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
        .badge { display: inline-block; background: #243333; color: #7dcfc4; border-radius: 4px; padding: 2px 8px; font-size: 0.85em; margin-left: 8px; }
        hr { border: none; border-top: 1px solid #2e4040; margin: 32px 0; }
        ul { color: #b0a090; }
        strong { color: #c9b99a; }
      </style>
    </head>
    <body>
      <h1>Deployed via Kubernetes RBAC <span class="badge">HTTPS</span></h1>
      <p>
        This page was deployed by <code>dev-user</code> — a restricted Kubernetes user
        with no cluster-admin rights, authenticated via a certificate signed by the
        cluster CA through a <code>CertificateSigningRequest</code>.
      </p>
      <hr>
      <p><strong>Stack:</strong></p>
      <ul>
        <li>Kubernetes 1.29 bootstrapped with <code>kubeadm</code></li>
        <li>Calico CNI with NetworkPolicy enforcement</li>
        <li>TLS certificate issued by Let's Encrypt via cert-manager</li>
        <li>Deployed via GitOps (ArgoCD)</li>
      </ul>
      <hr>
      <div style="text-align: center; margin-top: 32px;">
        <img src="https://p.kagi.com/proxy/Swamp-Thing-1989-3000-1000.jpg?c=dvsHBTu7WpagfxSkLuYhxQLcY-qACb05FQ8eYpRcXjPKBQqZyOrHB6l-cYcXeIq7CUA3fsObu-3du9zOSvTNjuz9ecEIYanuHiOHFOc5uQc%3D" alt="Swamp Thing" style="max-width: 100%; border-radius: 8px; opacity: 0.85;">
      </div>
    </body>
    </html>
