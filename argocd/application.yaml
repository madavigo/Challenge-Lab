apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/madavigo/Challenge-Lab
    targetRevision: HEAD
    path: nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-app
  syncPolicy:
    automated:
      prune: true       # removes resources deleted from git
      selfHeal: true    # reverts manual cluster changes back to git state
    syncOptions:
    - CreateNamespace=false   # namespace is managed separately in rbac/
